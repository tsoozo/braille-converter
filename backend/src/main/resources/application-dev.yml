spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/braille_dev}
    username: ${DB_USER:braille}
    password: ${DB_PASSWORD:braille}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    mn.braille: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-256-bits}
