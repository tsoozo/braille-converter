spring:
  application:
    name: braille-converter
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000      # 15 minutes in ms
    refresh-token-expiration: 604800000  # 7 days in ms
  rate-limit:
    requests-per-minute: 100
  braille:
    mapping-file: classpath:braille-mapping.json
