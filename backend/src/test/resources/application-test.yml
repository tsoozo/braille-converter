spring:
  datasource:
    url: jdbc:h2:mem:braille_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

logging:
  level:
    mn.braille: DEBUG
    root: WARN

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-256bits-long
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  rate-limit:
    requests-per-minute: 1000
